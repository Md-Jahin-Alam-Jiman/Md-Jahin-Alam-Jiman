<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
   <link rel="stylesheet" href="Profile_Card.css">
</head>

<body>
    <main class="profile-card">
        <figure class="avatar-container">
            <img class="avatar" src="../assets/image/Profile_Jiman.jpg" alt="Profile Image" loading="lazy">
            <figcaption style="display: none;">Profile photo: No Name, developer</figcaption>
        </figure>

        <header>
            <h1 class="profile-name">Md Jahin Alam Jiman</h1>
            <p class="title">✨ Frontend Learner ✨</p>
        </header>
        <section class="bio">
            <p>👋 Hello! I'm learning HTML, CSS, and JavaScript.
                I love building small UI components.</p>
        </section>
        <article>
            <ul class="details-list">
                <li class="detail-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Rajshahi, Bangladesh</span>
                </li>
                <li class="detail-item">
                    <i class="fas fa-envelope"></i>
                    <span class="email-text">mail@example.com</span>
                </li>
                <li class="detail-item">
                    <i class="fab fa-github"></i>
                    <span><a href="https://github.com/Md-Jahin-Alam-Jiman" target="_blank"
                            rel="noopener noreferrer">GitHub</a></span>
                </li>
            </ul>
            <button class="greet-btn" id="greetingButton">
                <i class="fas fa-hand-peace"></i> Say Hello
            </button>

            <!-- tiny footer to show box model explanation (optional) -->
            <footer class="model-note">
                ⬤ Box model: margin | border | padding | content
            </footer>
        </article>
    </main>
</body>

</html>
