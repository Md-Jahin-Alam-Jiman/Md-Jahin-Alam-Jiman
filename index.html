<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #27292b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .profile-card {
            max-width: 400px;
            width: 100%;
            background: rgb(0, 0, 0);
            padding: 2rem 1.8rem;
            border-radius: 32px;
            border: 1px solid black;
            margin: 0 auto;
            /* box-shadow: 
                inset 0 -3em 3em rgb(107, 80, 80),
                0 0 0 2px rgb(78, 60, 60),
                0.3em 0.3em 1em rgba(88, 85, 85, 0.6); */
            transition: transform 0.2s ease, box-shadow 0.2s;

        }

        .profile-card:hover {
            transform: translateY(-4px);
            box-shadow:
                inset 0 -3em 3em rgb(41, 39, 39),
                0 0 0 2px rgb(35, 33, 33),
                0.3em 0.3em 1em rgba(88, 85, 85, 0.6),
                0 20px 32px rgba(0, 0, 0, 0.12);
        }

        .avatar-container {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            outline: 1px solid #cbd5e1;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            animation-name: profileImageAnimation;
            animation-duration: 10s;
            animation-iteration-count: infinite;
            /* animation-timing-function: linear; */
            /* animation_delay: 3s; */
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
        }

        .avatar:hover {
            animation-play-state: paused;

        }


        /* @keyframes profileImageAnimation {
            0% {
                transform: scale(1);
            } 
            50% {
                transform: scale(2);
            }
            100% {
                transform: scale(1);
            }
            to{
                transform: rotate(360deg);
             } 
        }*/
        @keyframes profileImageAnimation {
            to {
                transform: rotate(360deg);
            }
        }


        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: #eeeff1;
            margin-bottom: 0.25rem;

        }

        .title {
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
            color: #2563eb;
            background: #eef2ff;
            display: inline-block;
            width: auto;
            margin: 0 auto 1rem auto;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            letter-spacing: 0.3px;
            animation: title 5s ease-in-out infinite;
            animation-direction: alternate;
        }

        @keyframes title {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(125px);
            }
        }

        .bio {
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #7a7d80;
            margin: 1rem 0 1.2rem 0;
            padding: 0.5rem 0;
            border-top: 1px dashed #e2e8f0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .details-list {
            list-style: none;
            margin: 1rem 0 1.2rem 0;
            padding: 0;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            background: #f8fafc;
            padding: 0.65rem 1rem;
            border-radius: 60px;
            margin-bottom: 0.7rem;
            font-size: 0.85rem;
            color: #151516;
            border: 1px solid #e2e8f0;
        }

        .detail-item i {
            width: 1.6rem;
            color: #3b82f6;
            font-size: 1rem;
        }

        /* email text can wrap */
        .email-text {
            font-family: monospace;
            word-break: break-all;
        }
        .greet-btn {
            width: 100%;
            background: #3b82f6;
            border: none;
            padding: 0.8rem 0;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.6rem;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .greet-btn:hover {
            background: #2563eb;
        }

        .greet-btn:active {
            transform: scale(0.97);
        }

        /* small footer note for box model demo (optional) */
        .model-note {
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 1.2rem;
            border-top: 1px solid #eef2ff;
            padding-top: 0.8rem;
        }

        /* responsive */
        @media (max-width: 450px) {
            .profile-card {
                padding: 1.5rem;
            }
            .name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <main class="profile-card">
        <figure class="avatar-container">
            <img class="avatar" src="assets\image\image.png" alt="Profile Image" loading="lazy">
            <figcaption style="display: none;">Profile photo: No Name, developer</figcaption>
        </figure>

        <header>
            <h1 class="profile-name">No Name</h1>
            <p class="title">✨ Frontend Learner ✨</p>
        </header>
        <section class="bio">
            <p>👋 Hello! I'm learning HTML, CSS, and JavaScript.
                I love building small UI components.</p>
        </section>
        <article>
            <ul class="details-list">
                <li class="detail-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Rajshahi</span>
                </li>
                <li class="detail-item">
                    <i class="fas fa-envelope"></i>
                    <span>mail@example.com</span>
                </li>
                <li class="detail-item">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </li>
            </ul>
            <button class="greet-btn" id="greetingButton">
                <i class="fas fa-hand-peace"></i> Say Hello
            </button>

            <!-- tiny footer to show box model explanation (optional) -->
            <footer class="model-note">
                ⬤ Box model: margin | border | padding | content
            </footer>
        </article>
    </main>
</body>

</html>
